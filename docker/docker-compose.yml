version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mpc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mpc
      POSTGRES_PASSWORD: mpc
      POSTGRES_DB: mpc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpc -d mpc"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mpc-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mpc:mpc@postgres:5432/mpc
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-32chars
      ENABLE_DEV_CREDENTIALS_AUTH: "true"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
